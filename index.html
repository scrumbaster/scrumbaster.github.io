            var tasks_container_div = document.getElementById("tasks_container");

            function open_settings(){
                window.location.href = "data_access_testing.html?v=20260709-1";
            }

            function del_task2(del_button) {
                //console.log(document.documentElement.scrollTop);
                scroll_position = document.documentElement.scrollTop;
                confirm_btn = document.getElementById(del_button.id + "confirm");
                del_button.style.display = "none";
                confirm_btn.style.display = "inline-block";
                const myTimeout = setTimeout(function () { confirm_btn.style.display = "none"; del_button.style.display = "inline-block"; confirm_btn.onclick = null; }, 2000);
                confirm_btn.onclick = function () {
                    clearTimeout(myTimeout);
                    confirm_btn.onclick = null;
                    confirm_btn.style.display = "none";
                    del_button.style.display = "inline-block";
                    tasks_list.style.display = "none";
                    confirm_yes_el.disabled = false;
                    if (del_button.title.includes('↻')) {
                        delete_template_div.style.display = "block";
                        delete_template.checked = false;
                    }

                    confirm_dlg.style.display = "block";
                    confirm_yes_el.onclick = function () {
                        confirm_yes_el.disabled = true;
                        if (delete_template.checked) {
                            request = '{"sp_name": "task_delete_template", "params": ["????"]}'.replace('????', del_button.title);
                        } else {
                            request = '{"sp_name": "task_delete", "params": ["????"]}'.replace('????', del_button.title);
                        }
                        delete_template_div.style.display = "none";
                        delete_template.checked = false;
                        exec_delete(request);
                    }
                }

            }

            function edit_task2(_task_el) {
                scroll_position = document.documentElement.scrollTop;
                confirm_btn = document.getElementById(_task_el.id.replace("task", "delconfirm"));
                confirm_btn.style.display = "inline-block";
                const myTimeout = setTimeout(function () { confirm_btn.style.display = "none"; confirm_btn.onclick = null; }, 2000);
                confirm_btn.onclick = function (){
                    clearTimeout(myTimeout);
                    confirm_btn.onclick = null;
                    confirm_btn.style.display = "none";
                    task_name_el.innerText = _task_el.innerText;
                    task_name_el.focus();
                    tasks_list.style.display = "none";
                    edit_task.style.display = 'block';
                }
            }

            function undo(dotundo) {
                scroll_position = document.documentElement.scrollTop;
                confirm_btn = document.getElementById(dotundo.id.replace('undo', "delconfirm"));
                dotundo.style.display = "none";
                confirm_btn.style.display = "inline-block";
                const myTimeout = setTimeout(function () { confirm_btn.style.display = "none"; dotundo.style.display = "inline-block"; exec_update(task_readall); confirm_btn.onclick = null; }, 2000);
                confirm_btn.onclick = function () {
                    clearTimeout(myTimeout);
                    confirm_btn.onclick = null;
                    confirm_btn.style.display = "none";
                    dotundo.style.display = "inline-block";
                    tasks_list.style.display = "none";
                    confirm_yes_el.disabled = false;
                    confirm_dlg.style.display = "block";
                    confirm_yes_el.onclick = function () {
                        confirm_yes_el.disabled = true;
                        //request = '{ "task_completed": { "S": "4" }, "task_name": { "S": "????" } }'.replace('????', dotundo.title);
                        request = '{"sp_name": "task_update", "params": ["????",4]}'.replace('????', dotundo.title);
                        exec_update(request);
                    }
                }
            }

            function myoninput2(myslider) {
                scroll_position = document.documentElement.scrollTop;
                confirm_btn = document.getElementById(myslider.id + "delconfirm");
                myslider.oninput = null;
                confirm_btn.style.display = "inline-block";
                const myTimeout = setTimeout(function () { confirm_btn.style.display = "none"; myslider.oninput = "myoninput(this);"; exec_update(task_readall); confirm_btn.onclick = null; }, 2000);
                confirm_btn.onclick = function () {
                    console.log('confirm_btn.onclick');
                    clearTimeout(myTimeout);
                    confirm_btn.onclick = null;
                    confirm_btn.style.display = "none";
                    myslider.oninput = "myoninput(this);"
                    tasks_list.style.display = "none";
                    confirm_yes_el.disabled = false;
                    confirm_dlg.style.display = "block";
                    confirm_yes_el.onclick = function () {
                        confirm_yes_el.disabled = true;
                        //request = '{ "task_completed": { "S": "!!!!" }, "task_name": { "S": "????" } }'.replace('!!!!', myslider.value).replace('????', myslider.title);
                        request = '{"sp_name": "task_update", "params": ["????",!!!!]}'.replace('!!!!', myslider.value).replace('????', myslider.title);
                        //console.log(request);
                        exec_update(request)
                    }
                }
            }


            function load_tasks(tasks_items) {
                tasks_container_div.innerHTML = "";
                cnt = new Int32Array([0])
                task_container_innerHTML = ""
                //console.log(tasks_items)
                tasks_items.forEach(item => add_task(item, cnt, task_container_innerHTML))
                tasks_container_div.innerHTML = task_container_innerHTML;
                tasks_list.style.display = "block";
                confirm_dlg.style.display = "none";
                add_from_task_list_dlg_el.style.display = "none";
                document.documentElement.scrollTop = scroll_position;
            }

            function add_task(task_item, cnt) {
                cnt[0]++
                task_completed_value = Number(task_item["task_completed"]);
                if (!Number.isFinite(task_completed_value)) { task_completed_value = 0; }
                task_name = task_item["task_name"];

                if (task_completed_value > 4) {
                    task_container_innerHTML = task_container_innerHTML.concat(
                        tasks_done_div.innerHTML.replaceAll('slider0', 'slider' + cnt[0])
                            .replaceAll('task_name', task_name)

                    )
                } else
                    if (task_completed_value < 2) {
                        task_container_innerHTML = task_container_innerHTML.concat(
                            tasks_todo_div.innerHTML.replaceAll('slider0', 'slider' + cnt[0])
                                .replaceAll('task_name', task_name)
                        )
                    } else {

                        task_container_innerHTML = task_container_innerHTML.concat(
                            tasks_doing_div.innerHTML.replaceAll('slider0', 'slider' + cnt[0])
                                .replaceAll('task_name', task_name)
                                .replace('value="2"', 'value="2"'.replace("2", task_completed_value))
                                .replace('slider_red', 'slider_red'.concat(task_completed_value))

                        )

                    }

            }

            function init_local_data_and_refresh() {
                if (window.ensureStorageInitialized) {
                    window.ensureStorageInitialized();
                }
                if (window.checkDailyTrigger) {
                    window.checkDailyTrigger();
                }
                exec_update(task_readall);
            }

            function exec_delete(_input) {
                try {
                    const payload = JSON.parse(_input);
                    const taskName = payload.params && payload.params[0];
                    if (payload.sp_name === "task_delete_template" && window.deleteTemplate) {
                        window.deleteTemplate(taskName);
                    } else if (payload.sp_name === "task_delete" && window.deleteTask) {
                        window.deleteTask(taskName);
                    }
                    load_tasks(window.getTaskItemsForUi ? window.getTaskItemsForUi() : []);
                } catch (error) {
                    console.error(error);
                }
            }

            function exec_update(_input) {
                try {
                    const payload = JSON.parse(_input);
                    if (payload.sp_name === "task_update" && payload.params && payload.params[0] && window.updateTaskCompletion) {
                        const taskName = payload.params[0];
                        const completionValue = payload.params[1];
                        window.updateTaskCompletion(taskName, completionValue);
                    }
                    load_tasks(window.getTaskItemsForUi ? window.getTaskItemsForUi() : []);
                } catch (error) {
                    console.error(error);
                }
            }

        </script>

                const templates = window.getTaskTemplatesInfo ? window.getTaskTemplatesInfo() : [];
                populate_add_from_task_list_container_el(templates);
            }

            function populate_add_from_task_list_container_el(_tasks_items) {
                add_from_task_list_container_el.innerHTML = "";
                cnt = new Int32Array([0])
                add_from_task_list_container_el_innerHTML = "";
                _tasks_items.forEach(item => add_task_to_list_container(item,cnt))
                //console.log(add_from_task_list_container_el_innerHTML);
                add_from_task_list_container_el.innerHTML = add_from_task_list_container_el_innerHTML;
                tasks_list.style.display = 'none';
                add_from_task_list_dlg_el.style.display = "block";
            }

            function add_task_to_list_container(_item, _cnt) {
                _cnt[0]++;
                add_from_task_list_container_el_innerHTML = add_from_task_list_container_el_innerHTML
                    + task_template_for_list_el.innerHTML.replaceAll("task_name", _item["task_name"]).replaceAll("template0", "template" + _cnt[0]).replaceAll("template_info", _item["info"]);
                //console.log(_add_from_task_list_container_el_innerHTML);
            };

            function add_requring_task_confirm(_task_span) {
                console.log(_task_span.id + "confirm")
                confirm_btn = document.getElementById(_task_span.id+"confirm");
                confirm_btn.style.display = "inline-block";
                const myTimeout = setTimeout(function () { confirm_btn.style.display = "none";}, 2000);
                confirm_btn.onclick = function () {
                    clearTimeout(myTimeout);
                    confirm_btn.onclick = null;
                    confirm_btn.style.display = "none";
                    go_to_pressed = true;
                    if (window.addTaskToTodo) {
                        window.addTaskToTodo(_task_span.innerText);
                    }
                    show_result_message("success")
                }

            }

            function add_requring_task(_requring_task_to_add) {
                go_to_pressed = true;
                if (window.addTaskToTodo) {
                    window.addTaskToTodo(_requring_task_to_add);
                }
                show_result_message("success")
            }

                    task_name_txt = task_name_txt.replaceAll('👔', '');
                    task_name_txt = task_name_txt.replaceAll('💰', '');
                    task_name_txt = task_name_txt.replaceAll('🏠', '');
                    task_name_txt = task_name_txt.replaceAll('🩺', '');
                    task_name_txt = task_name_txt.replaceAll('🤼', '');
                    task_name_txt = task_name_txt.replaceAll('🦁', '');
                    task_name_txt = task_name_txt.replaceAll('🚙', '');
                    task_name_txt = task_name_txt.replaceAll('🦷', '');
                    task_name_txt = task_name_txt.replaceAll('🏖️', '');
                    task_name_txt = task_name_txt.replaceAll('🚴', '');
                    task_name_txt = task_name_txt.replaceAll('🛠️', '');
                    if (symbol == '↻') { task_name_txt = task_name_txt.replaceAll('↻', ''); }

                    task_name_txt = symbol + task_name_txt;
                    task_name_el.innerHTML = task_name_txt;
                    task_name_el.focus();

                }

                function edit_task_load() {
                    scroll_position = document.documentElement.scrollTop;
                    tasks_list.style.display = 'none';
                    edit_task.style.display = 'block';
                    clear_text();
                }
                function clear_text() {
                    task_name_el.innerText = "";
                    task_name_el.readOnly = true;
                    task_name_el.readOnly = false;
                    task_name_el.focus();
                }
                function show_result_message(result_msg) {

                    if (result_msg == "success") {
                        clearing_timeout = setTimeout(clear_result_message, 2000);
                        result_message.style.color = "#1B998B";
                        result_message.innerHTML = result_msg;
                        if (go_to_pressed) {
                            go_to_pressed = false;
                            exec_update(task_readall);
                        }

                    } else {
                        result_message.style.color = "#E71D36";
                        result_message.innerHTML = result_msg;
                        clearing_timeout = setTimeout(clear_result_message, 9000);

                    }

                }
                function clear_result_message() {
                    result_message.innerHTML = "";
                    task_name_el.innerText = "";
                    task_name_el.readOnly = false;
                    task_name_el.focus();
                }
                function goto_todo() {
                    if (task_name_el.innerText.includes('↻')) {
                        tree_div.style.display = 'none';
                        edit_task.style.display = 'none';
                        task_name_recurrence_dlg.innerText = task_name_el.innerText;
                        recurrence_dlg.style.display = 'block'
                        recuring_click("DaysFromPrev");
                        //console.log('after recuring_click');
                    } else {
                        tree_div.style.display = 'none';
                        edit_task.style.display = 'none';
                        tasks_list.style.display = 'block';

                        if (task_name_el.innerText != "") {
                            go_to_pressed = true;
                            save_task(true);
                        } else {
                            exec_update(task_readall);
                        }
                    }
                }

                function save_task(shouldGoToTodo) {
                    if (task_name_el.innerText.includes('↻')) {
                        tree_div.style.display = 'none';
                        edit_task.style.display = 'none';
                        recurrence_dlg.style.display = 'block'
                        task_name_recurrence_dlg.innerText = task_name_el.innerText;
                        recuring_click("DaysFromPrev");
                        console.log('after recuring_click');
                    } else {
                        task_name_el.readOnly = true;
                        task_name = task_name_el.innerText;
                        request = '{"sp_name": "task_add", "params": ["????"]}'.replace('????', task_name);
                        exec_edit_task(request, shouldGoToTodo)
                    }

                }
                function exec_edit_task(input, shouldGoToTodo) {
                    try {
                        const taskName = task_name_el.innerText.trim();
                        if (!taskName) {
                            show_result_message("Task name is required.");
                            return;
                        }
                        if (window.addTaskToTodo) {
                            window.addTaskToTodo(taskName);
                            if (shouldGoToTodo) {
                                go_to_pressed = true;
                            }
                            show_result_message("success");
                            return;
                        }
                        show_result_message("Local data layer unavailable.");
                    } catch (error) {
                        show_result_message(error.message || "Error");
                    }
                }

            </script>

        <div id="tree" style="max-width:600px;border:solid; border-radius: 10px; border-color:#546692; border-width:5px; display:none">

            <ul id="risks" style="padding:0px;"></ul>

            <script>
                var tree_div = document.getElementById("tree");
                function renderRiskTree() {
                    var risks_el = document.getElementById("risks");
                    var risks = window.risks || [];
                    risks_el.replaceChildren();

                    function buildRiskItem(risk) {
                        var li = document.createElement("li");
                        var input = document.createElement("input");
                        var span = document.createElement("span");
                        var children = risk.children || [];

                        input.type = "radio";
                        input.name = "tree";
                        input.onclick = function () { caret_click(this); };

                        span.className = children.length > 0 ? "caret" : "noncaret";
                        span.textContent = risk.name;
                        span.onclick = function () { caret_click(this); };

                        li.appendChild(input);
                        li.appendChild(span);

                        if (children.length > 0) {
                            var ul = document.createElement("ul");
                            ul.className = "nested";
                            for (var i = 0; i < children.length; i++) {
                                ul.appendChild(buildRiskItem(children[i]));
                            }
                            li.appendChild(ul);
                        }

                        return li;
                    }

                    for (var i = 0; i < risks.length; i++) {
                        risks_el.appendChild(buildRiskItem(risks[i]));
                    }
                }

                function caret_click(caret) {
                    if (caret.parentElement.querySelector(".nested") != null) {
                        var parent = caret.parentElement;
                        var all_parents = [];
                        while (parent != null && parent.id != 'risks') {
                            all_parents.push(parent);
                            parent = parent.parentElement;
                        }
                        console.log(all_parents);
                        var carets = document.getElementById("risks").querySelectorAll(".caret-down");
                        for (var i = 0; i < carets.length; i++) {
                            if (all_parents.indexOf(carets.item(i).parentElement) < 0) {
                                carets.item(i).parentElement.querySelector(".nested").classList.remove("active");
                                carets.item(i).parentElement.querySelector(".caret").classList.remove("caret-down");
                            }
                        }

                        if (caret.parentElement.querySelector(".nested") != null) {
                            caret.parentElement.querySelector(".nested").classList.toggle("active");
                            caret.parentElement.querySelector(".caret").classList.toggle("caret-down");
                        }

                    }
                }
                renderRiskTree();
            </script>

                    position--;

                    position++;
