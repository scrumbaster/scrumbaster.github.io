                [357, "357"],
                [358, "358"],
                [359, "359"],
                [360, "360"],
                [361, "361"],
                [362, "362"],
                [363, "363"],
                [364, "364"],
                [365, "365"]
            ];

            dict = DaysInterval;

            var values = [];
            var min_position = 0;
            var max_position = 0;
            var position = 0;
            recuring_click("DaysInterval");

            function recuring_click(radio_value) {
                //alert(radio_value);
                if (radio_value == "Yearly") {dict = Yearly;}
                else if (radio_value == "Monthly") { dict = Monthly; }
                else if (radio_value == "Weekly") { dict = Weekly; }
                else { dict = DaysInterval; };
                max_position = dict.length - 1;
                interval_range.max = max_position;
                interval_range.value = Math.floor(max_position / 2);
                position = interval_range.value;
                move();
            }

            function slider_move() {
                position = interval_range.value;
                move();
            }

            function step_left() {
                position--;
                interval_range.value = position;
                move();
            }
            function step_right() {
                position++;
                interval_range.value = position;
                move();

            }

            function move() {
                if (position < min_position) (position = min_position);
                if (position > max_position) (position = max_position);
                values = dict[position];
                interval.innerText = values[1];
            }

        </script>

  <script>
    function updateView(statusMessage, outputValue) {
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');
      if (statusEl) {
        statusEl.textContent = statusMessage;
      }
      if (outputEl) {
        outputEl.textContent = typeof outputValue === 'string' ? outputValue : JSON.stringify(outputValue, null, 2);
      }
    }

    function handleSave() {
      try {
        window.saveDataToLocalStorage();
        updateView('Saved data.js to localStorage under key "db".', 'Stored successfully.');
      } catch (error) {
        updateView('Error: ' + error.message, '');
      }
    }

    function handleLoad() {
      try {
        const stored = window.loadFromLocalStorage();
        if (stored === null) {
          updateView('Nothing stored yet.', 'No data found in localStorage.');
          return;
        }

        updateView('Loaded data from localStorage.', stored);
      } catch (error) {
        updateView('Error reading stored data: ' + error.message, '');
      }
    }

    function handleClear() {
      try {
        window.clearLocalStorage();
        updateView('Cleared localStorage entry for key "db".', 'Local storage cleared.');
      } catch (error) {
        updateView('Error clearing storage: ' + error.message, '');
      }
    }

    function handleTaskTemplateOnly() {
      try {
        const taskTemplateList = window.getTaskTemplateOnly();
        updateView('Returned task_template entries from local storage.', taskTemplateList);
      } catch (error) {
        updateView('Error reading task_template: ' + error.message, '');
      }
    }

    function handleSaveDate() {
      try {
        const datePicker = document.getElementById('date-picker');
        if (!datePicker || !datePicker.value) {
          updateView('Please select a date.', '');
          return;
        }

        const result = window.saveDateToLocalStorage(datePicker.value);
        updateView('Saved CURDATE to local storage.', result);
      } catch (error) {
        updateView('Error saving date: ' + error.message, '');
      }
    }

    function handleReadDate() {
      try {
        const dateValue = window.readDateFromLocalStorage();
        if (!dateValue) {
          updateView('No CURDATE found.', '');
          return;
        }

        const datePicker = document.getElementById('date-picker');
        if (datePicker) {
          datePicker.value = dateValue;
        }
        updateView('Read CURDATE from local storage.', { CURDATE: dateValue });
      } catch (error) {
        updateView('Error reading date: ' + error.message, '');
      }
    }

    function handleCheckDailyTrigger() {
      try {
        const shouldTrigger = window.checkDailyTrigger();
        const currentDate = new Date().toISOString().slice(0, 10);
        updateView('Daily trigger check complete.', {
          shouldTrigger: shouldTrigger,
          currentDate: currentDate,
          storedDate: window.readDateFromLocalStorage()
        });
      } catch (error) {
        updateView('Error checking daily trigger: ' + error.message, '');
      }
    }

    function handleAddTaskToTodo() {
      try {
        const taskName = document.getElementById('task-name-input').value;
        const result = window.addTaskToTodo(taskName);
        updateView('Added task to todo list.', result);
      } catch (error) {
        updateView('Error adding task to todo: ' + error.message, '');
      }
    }

    function handleAddTemplate() {
      try {
        const taskName = document.getElementById('task-name-input').value;
        const intervalInput = document.getElementById('interval_range');
        const recurrenceInput = document.querySelector('input[name="recuring"]:checked');
        const currentDate = new Date().toISOString().slice(0, 10);
        const intervalValue = intervalInput ? intervalInput.value : '';
        const taskType = recurrenceInput ? recurrenceInput.value : '';
        const result = window.addTemplate(taskName, intervalValue, taskType, currentDate);
        updateView('Added template.', result);
      } catch (error) {
        updateView('Error adding template: ' + error.message, '');
      }
    }

    function handleDeleteTask() {
      try {
        const taskName = document.getElementById('task-name-input').value;
        const result = window.deleteTask(taskName);
        updateView('Delete task completed.', result);
      } catch (error) {
        updateView('Error deleting task: ' + error.message, '');
      }
    }

    function handleDeleteTemplate() {
      try {
        const taskName = document.getElementById('task-name-input').value;
        const result = window.deleteTemplate(taskName);
        updateView('Delete template completed.', result);
      } catch (error) {
        updateView('Error deleting template: ' + error.message, '');
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('save-data-button').addEventListener('click', handleSave);
      document.getElementById('read-data-button').addEventListener('click', handleLoad);
      document.getElementById('clear-data-button').addEventListener('click', handleClear);
      document.getElementById('task-template-button').addEventListener('click', handleTaskTemplateOnly);
      document.getElementById('save-date-button').addEventListener('click', handleSaveDate);
      document.getElementById('read-date-button').addEventListener('click', handleReadDate);
      document.getElementById('check-daily-trigger-button').addEventListener('click', handleCheckDailyTrigger);
      document.getElementById('add-task-button').addEventListener('click', handleAddTaskToTodo);
      document.getElementById('add-template-button').addEventListener('click', handleAddTemplate);
      document.getElementById('delete-task-button').addEventListener('click', handleDeleteTask);
      document.getElementById('delete-template-button').addEventListener('click', handleDeleteTemplate);
    });
  </script>
  <script>
    function handleDownloadLocalStorage() {
      try {
        const dataToDownload = window.getLocalStorageDataForDownload();
        const content = 'window.data = ' + JSON.stringify(dataToDownload, null, 2) + ';\n';
        const blob = new Blob([content], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'data.js';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        if (typeof window.updateView === 'function') {
          window.updateView('Downloaded local storage data as data.js.', dataToDownload);
        }
      } catch (error) {
        if (typeof window.updateView === 'function') {
          window.updateView('Error downloading data: ' + error.message, '');
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const downloadButton = document.getElementById('download-data-button');
      if (downloadButton) {
        downloadButton.addEventListener('click', handleDownloadLocalStorage);
      }
    });
  </script>
